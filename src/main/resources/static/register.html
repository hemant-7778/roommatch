<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-home me-2"></i>RoomMatch
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh; padding-top: 100px; padding-bottom: 50px"
    >
      <div
        class="glass-card p-5 animate-fade-in"
        style="width: 100%; max-width: 600px"
      >
        <div class="text-center mb-4">
          <h2 class="fw-bold mb-1">Create Account</h2>
          <p class="text-muted">Join the community and find your match</p>
        </div>

        <form id="registerForm">
          <!-- Name -->
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              required
              placeholder="John Doe"
            />
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              required
              placeholder="name@example.com"
            />
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              required
              placeholder="********"
            />
          </div>

          <!-- Age & Gender -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="age" class="form-label">Age</label>
              <input
                type="number"
                class="form-control"
                id="age"
                required
                min="18"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="gender" class="form-label">Gender</label>
              <select class="form-select" id="gender" required>
                <option value="" class="text-dark">Select Gender</option>
                <option value="Male" class="text-dark">Male</option>
                <option value="Female" class="text-dark">Female</option>
                <option value="Other" class="text-dark">Other</option>
              </select>
            </div>
          </div>

          <!-- City -->
          <div class="mb-4">
            <label for="city" class="form-label">City</label>
            <input
              type="text"
              class="form-control"
              id="city"
              required
              placeholder="New York"
            />
          </div>

          <!-- Submit -->
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary-custom btn-lg">
              Register
            </button>
          </div>
        </form>

        <div class="text-center mt-4">
          <p class="mb-0 text-muted">
            Already have an account?
            <a href="login.html" class="text-primary fw-bold text-gradient"
              >Login</a
            >
          </p>
        </div>

        <!-- Error Alert -->
        <div
          id="registerError"
          class="alert alert-danger mt-3 d-none text-center bg-transparent border-danger text-danger"
          role="alert"
        ></div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
