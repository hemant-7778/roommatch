<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top border-bottom border-danger">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">
          <i class="fas fa-shield-alt me-2"></i>RoomMatch Admin
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh; padding-top: 80px"
    >
      <div
        class="glass-card p-5 animate-fade-in border-danger"
        style="width: 100%; max-width: 450px; border-width: 2px"
      >
        <div class="text-center mb-4">
          <h2 class="fw-bold text-danger mb-1">Restricted Access</h2>
          <p class="text-muted">Staff Login Only</p>
        </div>

        <form id="adminLoginForm">
          <div class="mb-4">
            <label for="email" class="form-label">Admin Email</label>
            <div class="input-group">
              <span class="input-group-text bg-glass border-0 text-white">
                <i class="fas fa-envelope"></i>
              </span>
              <input
                type="email"
                class="form-control border-start-0 ps-0"
                id="email"
                required
                placeholder="admin@roommatch.com"
                style="background: rgba(15, 23, 42, 0.6) !important"
              />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-glass border-0 text-white">
                <i class="fas fa-lock"></i>
              </span>
              <input
                type="password"
                class="form-control border-start-0 ps-0"
                id="password"
                required
                placeholder="********"
                style="background: rgba(15, 23, 42, 0.6) !important"
              />
            </div>
          </div>

          <div class="d-grid gap-2 mt-5">
            <button type="submit" class="btn btn-danger btn-lg fw-bold">
              Secure Login
            </button>
          </div>
        </form>

        <!-- Error Alert -->
        <div
          id="loginError"
          class="alert alert-danger mt-3 d-none text-center bg-transparent border-danger text-danger"
          role="alert"
        ></div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const API_URL = "http://localhost:8080/api";
      
      document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("loginError");
        
        try {
          const response = await fetch(`${API_URL}/auth/signin`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();
          if (response.ok) {
            // Verify ADMIN role
            if (data.roles && data.roles.includes("ADMIN")) {
              localStorage.setItem("token", data.token);
              localStorage.setItem("user", JSON.stringify(data));
              window.location.href = "admin.html";
            } else {
              errorDiv.textContent = "Access Denied: You are not an administrator.";
              errorDiv.classList.remove("d-none");
            }
          } else {
            errorDiv.textContent = data.message || "Invalid credentials.";
            errorDiv.classList.remove("d-none");
          }
        } catch (error) {
          errorDiv.textContent = "Server error. Please try again later.";
          errorDiv.classList.remove("d-none");
        }
      });
    </script>
  </body>
</html>
