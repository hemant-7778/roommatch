<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-home me-2"></i>RoomMatch
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh; padding-top: 80px"
    >
      <div
        class="glass-card p-5 animate-fade-in"
        style="width: 100%; max-width: 450px"
      >
        <div class="text-center mb-4">
          <h2 class="fw-bold mb-1">Welcome Back</h2>
          <p class="text-muted">Login to continue match hunting</p>
        </div>

        <form id="loginForm">
          <div class="mb-4">
            <label for="email" class="form-label">Email address</label>
            <div class="input-group">
              <span class="input-group-text bg-glass border-0 text-white">
                <i class="fas fa-envelope"></i>
              </span>
              <input
                type="email"
                class="form-control border-start-0 ps-0"
                id="email"
                required
                placeholder="name@example.com"
                style="background: rgba(15, 23, 42, 0.6) !important"
              />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-glass border-0 text-white">
                <i class="fas fa-lock"></i>
              </span>
              <input
                type="password"
                class="form-control border-start-0 ps-0"
                id="password"
                required
                placeholder="********"
                style="background: rgba(15, 23, 42, 0.6) !important"
              />
            </div>
          </div>

          <div class="d-grid gap-2 mt-5">
            <button type="submit" class="btn btn-primary-custom btn-lg">
              Login
            </button>
          </div>
        </form>

        <div class="text-center mt-4">
          <p class="mb-0 text-muted">
            Don't have an account?
            <a href="register.html" class="text-primary fw-bold text-gradient"
              >Sign up</a
            >
          </p>
        </div>

        <!-- Error Alert -->
        <div
          id="loginError"
          class="alert alert-danger mt-3 d-none text-center bg-transparent border-danger text-danger"
          role="alert"
        ></div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
