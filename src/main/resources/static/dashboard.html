<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-home me-2"></i>RoomMatch
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link active" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link position-relative" href="chat.html">
                Chat
                <span
                  id="unread-badge"
                  class="position-absolute top-10 start-100 translate-middle badge rounded-pill bg-danger d-none"
                  style="font-size: 0.6rem"
                >
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="rooms.html">Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="requests.html">Requests</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="preferences.html">Preferences</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Profile</a>
            </li>
            <li class="nav-item ms-3">
              <button onclick="logout()" class="btn btn-outline-custom btn-sm">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container" style="padding-top: 100px; padding-bottom: 50px">
      <!-- Welcome Section -->
      <div class="glass-card mb-5 animate-fade-in">
        <div
          class="d-flex justify-content-between align-items-center flex-wrap gap-3"
        >
          <div>
            <h2 class="fw-bold mb-1">
              Hello, <span id="userName" class="text-gradient">User</span>!
            </h2>
            <p class="text-muted mb-0">
              Here are your top roommate matches based on your lifestyle.
            </p>
          </div>
          <span
            class="badge bg-glass border border-primary text-primary rounded-pill px-3 py-2"
            >Premium Member</span
          >
        </div>
      </div>

      <!-- Matches Grid -->
      <h4 class="fw-bold mb-4 animate-fade-in delay-100">Top Matches</h4>
      <div class="row g-4" id="matchesContainer">
        <!-- Matches will be loaded here -->
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Match Details Modal -->
    <div class="modal fade" id="matchModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content glass-card border-0">
          <div class="modal-header border-bottom border-secondary">
            <h5 class="modal-title fw-bold text-white">
              Compatibility Breakdown
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="row align-items-center">
              <div class="col-md-5 text-center mb-4 mb-md-0">
                <img
                  id="modalUserImage"
                  src="https://via.placeholder.com/150"
                  class="rounded-circle mb-3 border border-3 border-primary shadow-lg"
                  width="120"
                  height="120"
                  alt="User Image"
                />
                <h4 id="modalUserName" class="fw-bold text-white mb-1">
                  User Name
                </h4>
                <p id="modalUserBio" class="text-muted small mb-4">
                  User Bio...
                </p>
                  <i class="fas fa-comment-dots me-2"></i>Start Chat
                </button>
                <button
                  class="btn btn-outline-danger w-100 mt-2"
                  onclick="openReportModal()"
                >
                  <i class="fas fa-flag me-2"></i>Report User
                </button>
              </div>
              <div class="col-md-7">
                <div class="p-3 bg-glass rounded-3">
                  <canvas id="compatibilityChart"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Report User Modal -->
    <div class="modal fade" id="reportUserModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card border-0">
          <div class="modal-header border-bottom border-secondary">
            <h5 class="modal-title fw-bold text-white">Report User</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="reportUserForm">
              <input type="hidden" id="reportUserId">
              <div class="mb-3">
                <label class="form-label text-white-50">Reason for reporting</label>
                <select class="form-select bg-dark text-white border-secondary" id="reportReason" required>
                  <option value="SPAM">Spam or Scam</option>
                  <option value="HARASSMENT">Harassment</option>
                  <option value="INAPPROPRIATE_CONTENT">Inappropriate Content</option>
                  <option value="OTHER">Other</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label text-white-50">Description (Optional)</label>
                <textarea class="form-control bg-dark text-white border-secondary" id="reportDescription" rows="3"></textarea>
              </div>
              <button type="submit" class="btn btn-danger w-100">Submit Report</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
      // Inline script to init dashboard
      document.addEventListener("DOMContentLoaded", loadDashboard);
    </script>
  </body>
</html>
