<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requests - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet" />
    <style>
      .nav-pills .nav-link {
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        margin-right: 10px;
        transition: all 0.3s ease;
      }
      .nav-pills .nav-link:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      .nav-pills .nav-link.active {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--secondary) 100%
        );
        color: white;
        border: none;
        box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3);
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-home me-2"></i>RoomMatch
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link position-relative" href="chat.html">
                Chat
                <span
                  id="unread-badge"
                  class="position-absolute top-10 start-100 translate-middle badge rounded-pill bg-danger d-none"
                  style="font-size: 0.6rem"
                >
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="rooms.html">Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active position-relative" href="requests.html">
                Requests
                <span id="request-unread-badge" class="position-absolute top-10 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.6rem">
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="preferences.html">Preferences</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Profile</a>
            </li>
            <li class="nav-item ms-3">
              <button class="btn btn-outline-custom btn-sm" onclick="logout()">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container pt-5 mt-5">
      <div class="mb-5 animate-fade-in">
        <h2 class="fw-bold mb-1">Request Management</h2>
        <p class="text-muted">Track your applications and incoming requests</p>
      </div>

      <!-- Tabs -->
      <ul
        class="nav nav-pills mb-4 animate-fade-in"
        id="pills-tab"
        role="tablist"
      >
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active rounded-pill px-4"
            id="sent-tab"
            data-bs-toggle="pill"
            data-bs-target="#sent"
            type="button"
            role="tab"
            onclick="loadMyRequests()"
          >
            <i class="fas fa-paper-plane me-2"></i>Sent Requests
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link rounded-pill px-4"
            id="received-tab"
            data-bs-toggle="pill"
            data-bs-target="#received"
            type="button"
            role="tab"
            onclick="loadIncomingRequests()"
          >
            <i class="fas fa-inbox me-2"></i>Incoming Requests
          </button>
        </li>
      </ul>

      <div class="tab-content animate-fade-in delay-100" id="pills-tabContent">
        <!-- Sent Requests -->
        <div class="tab-pane fade show active" id="sent" role="tabpanel">
          <div class="row g-4" id="sentRequestsContainer">
            <!-- JS will populate -->
            <div class="col-12 text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
            </div>
          </div>
        </div>

        <!-- Incoming Requests -->
        <div class="tab-pane fade" id="received" role="tabpanel">
          <div class="row g-4" id="incomingRequestsContainer">
            <!-- JS will populate -->
            <div class="col-12 text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", loadRequestsPage);
    </script>
  </body>
</html>
