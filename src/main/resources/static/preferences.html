<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preferences - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-home me-2"></i>RoomMatch
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link position-relative" href="chat.html">
                Chat
                <span
                  id="unread-badge"
                  class="position-absolute top-10 start-100 translate-middle badge rounded-pill bg-danger d-none"
                  style="font-size: 0.6rem"
                >
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="rooms.html">Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="requests.html">Requests</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="preferences.html">Preferences</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Profile</a>
            </li>
            <li class="nav-item ms-3">
              <button class="btn btn-outline-custom btn-sm" onclick="logout()">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container" style="padding-top: 100px; padding-bottom: 50px">
      <div
        class="glass-card p-5 animate-fade-in mx-auto"
        style="max-width: 800px"
      >
        <div class="text-center mb-5">
          <h2 class="fw-bold mb-2">Lifestyle Preferences</h2>
          <p class="text-muted">
            Tell us about your habits to find the perfect roommate compatible
            with you.
          </p>
        </div>

        <form id="preferencesForm">
          <div class="row g-4">
            <!-- Sleep Time -->
            <div class="col-md-6">
              <label class="form-label">Sleep Time</label>
              <select class="form-select" name="sleepTime" required>
                <option value="EARLY" class="text-dark">
                  Early Bird (Before 11 PM)
                </option>
                <option value="LATE" class="text-dark">
                  Night Owl (After 12 AM)
                </option>
              </select>
            </div>

            <!-- Cleanliness -->
            <div class="col-md-6">
              <label class="form-label">Cleanliness</label>
              <select class="form-select" name="cleanliness" required>
                <option value="HIGH" class="text-dark">High (Spotless)</option>
                <option value="MEDIUM" class="text-dark">
                  Medium (Tidy enough)
                </option>
                <option value="LOW" class="text-dark">
                  Low (Messy is okay)
                </option>
              </select>
            </div>

            <!-- Smoking -->
            <div class="col-md-6">
              <label class="form-label">Smoking</label>
              <select class="form-select" name="smoking" required>
                <option value="NO" class="text-dark">No</option>
                <option value="YES" class="text-dark">Yes</option>
              </select>
            </div>

            <!-- Drinking -->
            <div class="col-md-6">
              <label class="form-label">Drinking</label>
              <select class="form-select" name="drinking" required>
                <option value="NO" class="text-dark">No</option>
                <option value="YES" class="text-dark">Yes</option>
              </select>
            </div>

            <!-- Guests -->
            <div class="col-md-6">
              <label class="form-label">Guests Frequency</label>
              <select class="form-select" name="guests" required>
                <option value="RARE" class="text-dark">Rarely</option>
                <option value="OFTEN" class="text-dark">Often</option>
              </select>
            </div>

            <!-- Food Type -->
            <div class="col-md-6">
              <label class="form-label">Food Preference</label>
              <select class="form-select" name="foodType" required>
                <option value="VEG" class="text-dark">Vegetarian</option>
                <option value="NON_VEG" class="text-dark">
                  Non-Vegetarian
                </option>
              </select>
            </div>

            <!-- Study Style -->
            <div class="col-md-6">
              <label class="form-label">Study Style</label>
              <select class="form-select" name="studyStyle" required>
                <option value="QUIET" class="text-dark">
                  Quiet Environment
                </option>
                <option value="FLEXIBLE" class="text-dark">
                  Flexible / Music okay
                </option>
              </select>
            </div>

            <!-- Noise Tolerance -->
            <div class="col-md-6">
              <label class="form-label">Noise Tolerance</label>
              <select class="form-select" name="noiseTolerance" required>
                <option value="LOW" class="text-dark">Low</option>
                <option value="MEDIUM" class="text-dark">Medium</option>
                <option value="HIGH" class="text-dark">High</option>
              </select>
            </div>

            <!-- Work Schedule -->
            <div class="col-md-6">
              <label class="form-label">Work Schedule</label>
              <select class="form-select" name="workSchedule" required>
                <option value="DAY" class="text-dark">Day Shift</option>
                <option value="NIGHT" class="text-dark">Night Shift</option>
              </select>
            </div>

            <!-- Pet Friendly -->
            <div class="col-md-6">
              <label class="form-label">Pet Friendly</label>
              <select class="form-select" name="petFriendly" required>
                <option value="YES" class="text-dark">Yes</option>
                <option value="NO" class="text-dark">No</option>
              </select>
            </div>
          </div>

          <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary-custom btn-lg px-5">
              Save Preferences
            </button>
          </div>
        </form>
        <div id="prefMessage" class="alert mt-3 d-none text-center"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
      // Inline init for preferences
      document.addEventListener("DOMContentLoaded", loadPreferences);
    </script>
  </body>
</html>
