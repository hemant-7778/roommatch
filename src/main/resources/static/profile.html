<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-home me-2"></i>RoomMatch
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link position-relative" href="chat.html">
                Chat
                <span
                  id="unread-badge"
                  class="position-absolute top-10 start-100 translate-middle badge rounded-pill bg-danger d-none"
                  style="font-size: 0.6rem"
                >
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="rooms.html">Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link position-relative" href="requests.html">
                Requests
                <span id="request-unread-badge" class="position-absolute top-10 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.6rem">
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="preferences.html">Preferences</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="profile.html">Profile</a>
            </li>
            <li class="nav-item ms-3">
              <button onclick="logout()" class="btn btn-outline-custom btn-sm">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container" style="padding-top: 100px; padding-bottom: 50px">
      <div
        class="glass-card p-5 animate-fade-in mx-auto"
        style="max-width: 800px"
      >
        <div class="text-center mb-5">
          <div class="position-relative d-inline-block">
            <img
              id="profileImagePreview"
              src="https://via.placeholder.com/150"
              class="rounded-circle border border-4 border-primary shadow-lg mb-3 object-fit-cover"
              width="150"
              height="150"
            />
            <div class="position-absolute bottom-0 end-0 mb-3 me-2">
              <label
                for="profileImageFile"
                class="btn btn-sm btn-primary-custom rounded-circle p-2"
                style="cursor: pointer; width: 36px; height: 36px"
              >
                <i class="fas fa-camera"></i>
              </label>
            </div>
          </div>
          <h2 class="fw-bold mb-1">My Profile</h2>
          <p class="text-muted">Manage your personal information</p>
        </div>

        <form id="profileForm">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                name="name"
                id="profileName"
                required
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                name="email"
                id="profileEmail"
                readonly
                disabled
                style="opacity: 0.7; background: rgba(0, 0, 0, 0.2) !important"
              />
            </div>

            <div class="col-md-4">
              <label class="form-label">Age</label>
              <input
                type="number"
                class="form-control"
                name="age"
                id="profileAge"
                required
              />
            </div>

            <div class="col-md-4">
              <label class="form-label">Gender</label>
              <select class="form-select" name="gender" id="profileGender">
                <option value="Male" class="text-dark">Male</option>
                <option value="Female" class="text-dark">Female</option>
                <option value="Other" class="text-dark">Other</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">City</label>
              <input
                type="text"
                class="form-control"
                name="city"
                id="profileCity"
                required
              />
            </div>

            <!-- Hidden File Input, triggered by camera icon -->
            <input
              type="file"
              class="form-control d-none"
              name="profileImage"
              id="profileImageFile"
              accept="image/*"
              onchange="
                document.getElementById('profileImagePreview').src =
                  window.URL.createObjectURL(this.files[0])
              "
            />

            <div class="col-12">
              <label class="form-label">Bio</label>
              <textarea
                class="form-control"
                name="bio"
                id="profileBio"
                rows="4"
                placeholder="Tell potential roommates about yourself..."
              ></textarea>
            </div>

            <div class="col-md-6">
              <label class="form-label">Min Budget (₹)</label>
              <input
                type="number"
                class="form-control"
                name="budgetMin"
                id="budgetMin"
                placeholder="500"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">Max Budget (₹)</label>
              <input
                type="number"
                class="form-control"
                name="budgetMax"
                id="budgetMax"
                placeholder="1500"
              />
            </div>
          </div>

          <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary-custom btn-lg px-5">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", loadProfile);
    </script>
  </body>
</html>
