<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms - RoomMatch</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fas fa-home me-2"></i>RoomMatch
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link position-relative" href="chat.html">
                Chat
                <span
                  id="unread-badge"
                  class="position-absolute top-10 start-100 translate-middle badge rounded-pill bg-danger d-none"
                  style="font-size: 0.6rem"
                >
                  0
                </span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="rooms.html">Rooms</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="requests.html">Requests</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="preferences.html">Preferences</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html">Profile</a>
            </li>
            <li class="nav-item ms-3">
              <button onclick="logout()" class="btn btn-outline-custom btn-sm">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container" style="padding-top: 100px; padding-bottom: 50px">
      <div
        class="d-flex justify-content-between align-items-center mb-5 animate-fade-in"
      >
        <div>
          <h2 class="fw-bold mb-1">Available Rooms</h2>
          <p class="text-muted">Find your next home</p>
        </div>
        <button
          class="btn btn-primary-custom"
          data-bs-toggle="modal"
          data-bs-target="#postRoomModal"
        >
          <i class="fas fa-plus me-2"></i>Post Room
        </button>
      </div>

      <div class="row">
        <!-- Filter Sidebar -->
        <div class="col-lg-3 mb-4">
          <div class="glass-card p-4 animate-fade-in">
            <h5 class="fw-bold mb-3">
              <i class="fas fa-filter me-2"></i>Filters
            </h5>
            <form id="filterForm">
              <div class="mb-3">
                <label class="form-label small text-muted">Location</label>
                <input
                  type="text"
                  class="form-control form-control-sm"
                  id="filterLocation"
                  placeholder="City or area"
                />
              </div>
              <div class="mb-3">
                <label class="form-label small text-muted"
                  >Rent Range (₹)</label
                >
                <div class="d-flex gap-2">
                  <input
                    type="number"
                    class="form-control form-control-sm"
                    id="filterMinRent"
                    placeholder="Min"
                  />
                  <input
                    type="number"
                    class="form-control form-control-sm"
                    id="filterMaxRent"
                    placeholder="Max"
                  />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label small text-muted">Room Type</label>
                <select class="form-select form-select-sm" id="filterRoomType">
                  <option value="">All Types</option>
                  <option value="Single">Single Room</option>
                  <option value="Shared">Shared Room</option>
                  <option value="Entire Place">Entire Place</option>
                </select>
              </div>
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary-custom btn-sm">
                  Apply Filters
                </button>
                <button
                  type="button"
                  class="btn btn-outline-light btn-sm"
                  onclick="resetFilters()"
                >
                  Reset
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Room List -->
        <div class="col-lg-9">
          <div class="row g-4" id="roomsContainer">
            <div class="col-12 text-center py-5">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Post Room Modal -->
    <div class="modal fade" id="postRoomModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card border-0">
          <div class="modal-header border-bottom border-secondary">
            <h5 class="modal-title fw-bold text-white">Post a Room</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="postRoomForm">
              <div class="mb-3">
                <label class="form-label">Location</label>
                <input
                  type="text"
                  class="form-control"
                  id="roomLocation"
                  placeholder="e.g. Downtown, Manhattan"
                  required
                />
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">Rent (₹)</label>
                  <input
                    type="number"
                    class="form-control"
                    id="roomRent"
                    placeholder="1200"
                    required
                  />
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label">Type</label>
                  <select class="form-select" id="roomType">
                    <option value="Single" class="text-dark">
                      Single Room
                    </option>
                    <option value="Shared" class="text-dark">
                      Shared Room
                    </option>
                    <option value="Entire Place" class="text-dark">
                      Entire Place
                    </option>
                  </select>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Amenities</label>
                <input
                  type="text"
                  class="form-control"
                  id="roomAmenities"
                  placeholder="WiFi, AC, Gym, Parking"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                  class="form-control"
                  id="roomDesc"
                  rows="3"
                  placeholder="Tell us a bit about the place..."
                ></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Photos (Multiple allowed)</label>
                <input type="file" class="form-control" id="roomPhotos" accept="image/*" multiple />
              </div>
              <div class="mb-3">
                <label class="form-label">Video (Optional)</label>
                <input type="file" class="form-control" id="roomVideo" accept="video/*" />
              </div>
              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary-custom">
                  Post Listing
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", loadRooms);
    </script>
  </body>
</html>
