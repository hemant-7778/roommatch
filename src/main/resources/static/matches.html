<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matches - RoomMatch</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
      <div class="container">
        <a class="navbar-brand" href="index.html"
          ><i class="fas fa-home me-2"></i>RoomMatch</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="matches.html">Matches</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container" style="padding-top: 100px; padding-bottom: 50px">
      <div
        class="d-flex justify-content-between align-items-center mb-5 animate-fade-in"
      >
        <div>
          <h2 class="fw-bold mb-1">Search Results</h2>
          <p class="text-white-50" id="searchCriteria">
            Showing matches based on your criteria
          </p>
        </div>
        <a href="index.html#smart-search" class="btn btn-secondary-custom"
          >Adjust Filters</a
        >
      </div>

      <!-- Matches Grid -->
      <div class="row g-4" id="searchResultsContainer">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Match Details Modal -->
    <div class="modal fade" id="matchModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content glass-card border-0">
          <div class="modal-header border-bottom border-white-10">
            <h5 class="modal-title fw-bold">Match Details</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="row">
              <div class="col-md-4 text-center">
                <img
                  id="modalUserImage"
                  src=""
                  class="rounded-circle mb-3"
                  style="width: 120px; height: 120px; object-fit: cover"
                />
                <h4 id="modalUserName" class="fw-bold"></h4>
              </div>
              <div class="col-md-8">
                <h5 class="text-primary mb-3">Bio</h5>
                <p id="modalUserBio" class="text-white-50 small"></p>

                <h5 class="text-primary mb-3 mt-4">Compatibility Breakdown</h5>
                <canvas id="compatibilityChart"></canvas>
              </div>
            </div>
          </div>
          <div class="modal-footer border-top border-white-10">
            <button type="button" class="btn btn-primary-custom w-100">
              Send Message
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Parse query params and load matches
        const params = new URLSearchParams(window.location.search);
        loadSearchResults(params);
      });
    </script>
  </body>
</html>
